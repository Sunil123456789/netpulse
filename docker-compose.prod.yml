name: netpulse-prod

services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
    container_name: netpulse-client-prod
    ports:
      - "3000:80"
    networks:
      - netpulse-prod
    restart: always

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    container_name: netpulse-server-prod
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - ./certs:/app/certs:ro
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - netpulse-prod
    restart: always

  mongo:
    image: mongo:7
    container_name: netpulse-mongo-prod
    volumes:
      - mongo-prod-data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: netpulse
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - netpulse-prod
    restart: always

  redis:
    image: redis:7-alpine
    container_name: netpulse-redis-prod
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-prod-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - netpulse-prod
    restart: always

volumes:
  mongo-prod-data:
  redis-prod-data:

networks:
  netpulse-prod:
    driver: bridge
