<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f7ef5"/>
      <stop offset="100%" stop-color="#7c5cfc"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="40" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#22d3a0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="40" height="40" rx="10" fill="url(#bg)"/>
  <!-- Pulse / ECG waveform -->
  <polyline
    points="4,20 10,20 13,11 17,28 21,13 24,24 27,20 36,20"
    stroke="url(#pulse)" stroke-width="2.5"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Node dots -->
  <circle cx="13" cy="11" r="1.8" fill="#22d3ee"/>
  <circle cx="21" cy="13" r="1.8" fill="#22d3a0"/>
</svg>
