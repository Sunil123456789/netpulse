events { worker_connections 1024; }
http {
  upstream api    { server server:5000; }
  upstream client { server client:80;   }
  server { listen 80; server_name _; return 301 https://$host$request_uri; }
  server {
    listen 443 ssl; server_name _;
    ssl_certificate     /etc/nginx/certs/netpulse.crt;
    ssl_certificate_key /etc/nginx/certs/netpulse.key;

    location /health {
      proxy_pass http://api/health;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / { proxy_pass http://client; }
  }
}
